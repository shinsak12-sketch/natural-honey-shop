<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자주 묻는 질문 — 월악산 꿀벌쉼터</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gothic+A1:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-slot"></div>
<main class="page">
  <div class="container" style="max-width:720px">
    <div class="breadcrumb"><a href="index.html">홈</a> › 자주 묻는 질문</div>
    <div class="page-head"><span class="eyebrow">FAQ</span><h1 class="page-title">자주 묻는 질문</h1></div>
    <div id="faq-list"></div>
    <div class="pay-note" style="margin-top:30px;text-align:center">더 궁금한 점은 <b>010-9859-3044</b>로 편하게 연락 주세요.</div>
  </div>
</main>
<div id="footer-slot"></div>
<script src="assets/js/store.js"></script><script src="assets/js/layout.js"></script>
<script>
renderHeader('faq');renderFooter();
const faqs=[
  ['꿀이 하얗게 굳었어요. 상한 건가요?','아닙니다. 천연꿀은 온도가 낮아지면 포도당이 결정화되어 하얗게 굳는 자연스러운 현상입니다. 오히려 진짜 꿀이라는 증거예요. 따뜻한 물(40도 이하)에 용기째 중탕하면 다시 맑아집니다.'],
  ['배송은 얼마나 걸리나요?','주문 확인 후 1~3일 내 발송되며, 보통 발송 후 1~2일이면 받아보실 수 있습니다. 스티로폼 보냉 포장으로 안전하게 보내드립니다.'],
  ['보관은 어떻게 하나요?','직사광선을 피해 실온의 그늘진 곳에 보관하시면 됩니다. 냉장 보관 시 결정화가 빨라질 수 있어요. 나무·플라스틱 숟가락 사용을 권장합니다.'],
  ['돌이 지나지 않은 아기도 먹을 수 있나요?','만 12개월 미만 영아에게는 꿀을 먹이지 마세요. 보툴리누스균 위험이 있어 권장하지 않습니다.'],
  ['선물 포장이 되나요?','스틱 제품은 선물 박스로 구성되어 있습니다. 추가 선물 포장이 필요하시면 주문 시 메모로 남겨주시거나 전화로 문의해 주세요.'],
  ['교환·환불이 가능한가요?','식품 특성상 단순 변심에 의한 교환·환불은 어렵습니다. 다만 배송 중 파손이나 상품 하자가 있는 경우 수령 후 7일 이내 연락 주시면 교환해 드립니다.'],
];
document.getElementById('faq-list').innerHTML = faqs.map(([q,a])=>`
  <div class="faq-item">
    <button class="faq-q" onclick="this.parentElement.classList.toggle('open')">${q}<span class="mark">+</span></button>
    <div class="faq-a"><div class="faq-a-inner">${a}</div></div>
  </div>`).join('');
</script>
</body></html>
