<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문 완료 — 자연꽃꿀</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gothic+A1:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-slot"></div>
<main class="page">
  <div class="container" style="max-width:620px">
    <div style="text-align:center;padding:40px 0">
      <div style="font-size:4rem;margin-bottom:14px">🍯</div>
      <h1 class="page-title">주문이 접수되었습니다</h1>
      <p class="page-sub" style="margin-top:10px">주문해 주셔서 감사합니다. 곧 연락드리겠습니다.</p>
    </div>
    <div class="summary" style="position:static" id="done-slot"></div>
    <div style="display:flex;gap:12px;margin-top:22px">
      <a href="order-lookup.html" class="btn btn-ghost btn-block">주문 조회</a>
      <a href="products.html" class="btn btn-primary btn-block">계속 쇼핑하기</a>
    </div>
  </div>
</main>
<div id="footer-slot"></div>
<script src="assets/js/store.js"></script>
<script src="assets/js/layout.js"></script>
<script>
renderHeader(''); renderFooter();
const no = new URLSearchParams(location.search).get('no');
const order = DB.getOrders().find(o=>o.orderNo===no);
const slot = document.getElementById('done-slot');
if(order){
  slot.innerHTML = `
    <div class="summary-row"><span>주문번호</span><span style="font-weight:800;color:var(--honey-deep)">${order.orderNo}</span></div>
    <div class="summary-row"><span>받는 분</span><span>${order.buyer.name}</span></div>
    <div class="summary-row"><span>연락처</span><span>${order.buyer.phone}</span></div>
    <div class="summary-row"><span>결제 수단</span><span>${order.payMethod}</span></div>
    <div style="height:1px;background:var(--line);margin:12px 0"></div>
    ${order.items.map(i=>`<div class="summary-row"><span>${i.name} × ${i.qty}</span><span>${won(i.price*i.qty)}</span></div>`).join('')}
    <div class="summary-total"><span>총 결제금액</span><span class="amt">${won(order.total)}</span></div>
    <div class="pay-note" style="margin-top:16px">입금/결제 안내는 등록하신 연락처로 안내드립니다. 주문번호를 꼭 기억해 주세요.</div>`;
} else {
  slot.innerHTML = `<p class="empty">주문 정보를 찾을 수 없습니다.</p>`;
}
</script>
</body>
</html>
