<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문하기 — 월악산 꿀벌쉼터</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gothic+A1:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-slot"></div>
<main class="page">
  <div class="container">
    <div class="breadcrumb"><a href="cart.html">장바구니</a> › 주문하기</div>
    <div class="page-head"><h1 class="page-title">주문/결제</h1></div>
    <div id="checkout-slot"></div>
  </div>
</main>
<div id="footer-slot"></div>
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/layout.js"></script>
<script>
renderHeader('cart'); renderFooter();
const FREE_SHIP=50000, SHIP_FEE=3500;
const slot = document.getElementById('checkout-slot');
let cartItems = [];

(async () => {
  slot.innerHTML = '<p class="empty">불러오는 중…</p>';
  try{ cartItems = await DB.getCartDetailed(); }
  catch(e){ slot.innerHTML = '<p class="empty">불러오지 못했습니다.</p>'; return; }
  if(!cartItems.length){
    slot.innerHTML = `<div class="empty"><div class="ico">🛒</div><p>주문할 상품이 없습니다.</p><a href="products.html" class="btn btn-primary">상품 보러 가기</a></div>`;
    return;
  }
  const subtotal = cartItems.reduce((s,i)=>s+i.lineTotal,0);
  const ship = subtotal>=FREE_SHIP?0:SHIP_FEE;
  const total = subtotal+ship;
  slot.innerHTML = `
  <div class="cart-layout">
    <div>
      <h3 class="serif" style="font-size:1.3rem;margin-bottom:16px">받는 분 정보</h3>
      <div class="field"><label>받는 분 이름 <span class="req">*</span></label><input id="f-name" placeholder="홍길동"></div>
      <div class="field"><label>연락처 <span class="req">*</span></label><input id="f-phone" placeholder="010-0000-0000" inputmode="numeric"></div>
      <div class="field"><label>주소 <span class="req">*</span></label>
        <div style="display:flex;gap:8px">
          <input id="f-zip" placeholder="우편번호" readonly style="flex:0 0 110px;background:var(--cream-deep)">
          <button type="button" class="btn btn-ghost" style="flex:0 0 auto;padding:12px 16px" onclick="searchAddr()">주소 검색</button>
        </div>
        <input id="f-addr1" placeholder="도로명/지번 주소" readonly style="margin-top:8px;background:var(--cream-deep)">
        <input id="f-addr2" placeholder="상세 주소 (동·호수 등)" style="margin-top:8px">
      </div>
      <div class="field"><label>배송 메모</label><textarea id="f-memo" placeholder="문 앞에 두고 가주세요 등"></textarea></div>

      <h3 class="serif" style="font-size:1.3rem;margin:30px 0 16px">결제 수단</h3>
      <div class="pay-methods" id="pay">
        <label class="pay-opt sel"><input type="radio" name="pay" value="무통장입금" checked><span><b>무통장 입금</b> · 계좌이체</span></label>
        <label class="pay-opt"><input type="radio" name="pay" value="카드결제"><span><b>신용/체크카드</b></span></label>
        <label class="pay-opt"><input type="radio" name="pay" value="간편결제"><span><b>간편결제</b> · 카카오페이/네이버페이</span></label>
      </div>
      <div class="pay-note">
        🔧 현재는 <b>온라인 결제 준비 단계</b>입니다. 지금 주문하시면 주문서가 접수되며,
        실제 결제·입금 안내는 <b>전화(010-9859-3044)</b>로 연락드립니다.
      </div>
    </div>

    <aside class="summary">
      <h3>주문 상품</h3>
      ${cartItems.map(i=>`<div class="summary-row"><span>${i.product.name} × ${i.qty}</span><span>${won(i.lineTotal)}</span></div>`).join('')}
      <div style="height:1px;background:var(--line);margin:12px 0"></div>
      <div class="summary-row"><span>상품 합계</span><span>${won(subtotal)}</span></div>
      <div class="summary-row"><span>배송비</span><span>${ship===0?'무료':won(ship)}</span></div>
      <div class="summary-total"><span>총 결제금액</span><span class="amt">${won(total)}</span></div>
      <button class="btn btn-primary btn-block" style="margin-top:18px" id="placeBtn" onclick="placeOrder(${total},${ship})">주문 접수하기</button>
    </aside>
  </div>`;
  document.getElementById('pay').addEventListener('change',e=>{
    document.querySelectorAll('.pay-opt').forEach(o=>o.classList.remove('sel'));
    e.target.closest('.pay-opt').classList.add('sel');
  });
})();

async function placeOrder(total, ship){
  const name=val('f-name'), phone=val('f-phone'), zip=val('f-zip'), a1=val('f-addr1'), a2=val('f-addr2');
  if(!name||!phone||!a1){ toast('받는 분 이름·연락처·주소를 입력해주세요'); return; }
  const btn=document.getElementById('placeBtn'); btn.disabled=true; btn.textContent='접수 중…';
  const pay = document.querySelector('input[name=pay]:checked').value;
  const fullAddr = (zip?`(${zip}) `:'') + a1 + (a2?' '+a2:'');
  try{
    const order = await DB.createOrder({
      items: cartItems.map(i=>({ name:i.product.name, spec:i.product.spec, price:i.product.price, qty:i.qty, emoji:i.product.emoji })),
      buyer: { name, phone, address: fullAddr, memo: val('f-memo') },
      payMethod: pay, shippingFee: ship, total
    });
    DB.clearCart();
    location.href = 'order-done.html?no='+encodeURIComponent(order.orderNo);
  }catch(e){
    toast('주문 접수 실패: '+e.message); btn.disabled=false; btn.textContent='주문 접수하기';
  }
}
// 카카오(다음) 우편번호 검색
function searchAddr(){
  if(typeof daum==='undefined'||!daum.Postcode){ toast('주소 검색을 불러오지 못했습니다. 잠시 후 다시 시도해주세요'); return; }
  new daum.Postcode({
    oncomplete: function(data){
      document.getElementById('f-zip').value = data.zonecode;
      document.getElementById('f-addr1').value = data.roadAddress || data.jibunAddress;
      document.getElementById('f-addr2').focus();
    }
  }).open();
}
function val(id){ return (document.getElementById(id)?.value||'').trim(); }
</script>
</body>
</html>
