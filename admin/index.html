<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인 — 자연꽃꿀</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gothic+A1:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="logo">
      <svg viewBox="0 0 40 40" fill="none"><path d="M20 2l15.6 9v18L20 38 4.4 29V11z" fill="#E8A317" fill-opacity=".25" stroke="#B26B00" stroke-width="1.6"/><ellipse cx="20" cy="20" rx="6" ry="8" fill="#E8A317"/><path d="M14 16h12M14 20h12M14 24h12" stroke="#241B12" stroke-width="1.3"/></svg>
      <b>자연<span>꽃꿀</span></b>
    </div>
    <p class="sub">판매 관리자 페이지</p>
    <input id="pw" type="password" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-honey" style="width:100%;padding:13px" onclick="doLogin()">로그인</button>
    <p class="login-hint">초기 비밀번호: <b>honey1234</b><br>(실제 오픈 시 안전한 비밀번호로 변경됩니다)</p>
  </div>
</div>
<script src="../assets/js/store.js"></script>
<script src="admin.js"></script>
<script>
if(DB.isAdmin()) location.href='dashboard.html';
function doLogin(){
  const pw=document.getElementById('pw').value;
  if(DB.login(pw)){ location.href='dashboard.html'; }
  else { adminToast('비밀번호가 올바르지 않습니다'); document.getElementById('pw').value=''; }
}
</script>
</body></html>
