<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드 — 자연꽃꿀 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gothic+A1:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin">
  <div id="sidebar-slot"></div>
  <div class="main">
    <div id="mobilebar-slot"></div>
    <div class="topbar">
      <div><h1>대시보드</h1><div class="sub">오늘의 판매 현황을 한눈에 확인하세요.</div></div>
      <a href="products.html" class="btn btn-honey">+ 새 상품 등록</a>
    </div>
    <div class="stat-grid" id="stats"></div>
    <div class="panel">
      <div class="panel-head"><h2>최근 주문</h2><a href="orders.html" class="btn btn-ghost btn-sm">전체 보기</a></div>
      <div class="panel-body tbl-wrap"><table class="tbl" id="recent"></table></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h2>재고 주의 상품</h2></div>
      <div class="panel-body tbl-wrap"><table class="tbl" id="lowstock"></table></div>
    </div>
  </div>
</div>
<script src="../assets/js/store.js"></script>
<script src="admin.js"></script>
<script>
if(!adminGuard()) {} else {
renderAdminShell('dash');
const orders = DB.getOrders();
const products = DB.getProducts();
const today = new Date().toDateString();
const todayOrders = orders.filter(o=>new Date(o.createdAt).toDateString()===today);
const newOrders = orders.filter(o=>o.status==='주문접수');
const revenue = orders.filter(o=>o.status!=='취소').reduce((s,o)=>s+o.total,0);

document.getElementById('stats').innerHTML = `
  <div class="stat"><div class="label">📥 신규 주문</div><div class="num honey">${newOrders.length}</div></div>
  <div class="stat"><div class="label">📅 오늘 주문</div><div class="num">${todayOrders.length}</div></div>
  <div class="stat"><div class="label">💰 누적 매출</div><div class="num">${won(revenue)}</div></div>
  <div class="stat"><div class="label">📦 판매 상품</div><div class="num">${products.length}</div></div>`;

const recent = orders.slice(0,5);
document.getElementById('recent').innerHTML = recent.length ? `
  <thead><tr><th>주문번호</th><th>받는분</th><th>상품</th><th>금액</th><th>상태</th></tr></thead>
  <tbody>${recent.map(o=>`<tr>
    <td><a href="orders.html" style="color:var(--honey-deep);font-weight:700">${o.orderNo}</a></td>
    <td>${o.buyer.name}</td>
    <td class="muted">${o.items[0]?.name||''}${o.items.length>1?` 외 ${o.items.length-1}건`:''}</td>
    <td style="font-weight:700">${won(o.total)}</td>
    <td><span class="st-${o.status}" style="font-weight:700">${o.status}</span></td>
  </tr>`).join('')}</tbody>` : `<tbody><tr><td><div class="empty" style="padding:30px"><p>아직 주문이 없습니다.</p></div></td></tr></tbody>`;

const low = products.filter(p=>p.stock<=5).sort((a,b)=>a.stock-b.stock);
document.getElementById('lowstock').innerHTML = low.length ? `
  <thead><tr><th></th><th>상품명</th><th>남은 수량</th><th>상태</th></tr></thead>
  <tbody>${low.map(p=>`<tr>
    <td class="pemoji">${p.emoji}</td>
    <td class="pname">${p.name}</td>
    <td><b style="color:${p.stock<=0?'var(--warn)':'#c87800'}">${p.stock}개</b></td>
    <td>${p.stock<=0?'<span class="tag tag-off">품절</span>':'<span class="tag tag-low">재고 부족</span>'}</td>
  </tr>`).join('')}</tbody>` : `<tbody><tr><td><div class="empty" style="padding:30px"><p>재고가 충분합니다. 👍</p></div></td></tr></tbody>`;
}
</script>
</body></html>
