<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문 관리 — 자연꽃꿀 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gothic+A1:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin">
  <div id="sidebar-slot"></div>
  <div class="main">
    <div id="mobilebar-slot"></div>
    <div class="topbar">
      <div><h1>주문 관리</h1><div class="sub">들어온 주문을 확인하고 배송 상태를 관리하세요.</div></div>
    </div>
    <div class="filter-bar" id="filter" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px"></div>
    <div class="panel">
      <div class="panel-head"><h2>주문 목록 <span class="muted" id="count" style="font-weight:400;font-size:.9rem"></span></h2></div>
      <div class="panel-body tbl-wrap"><table class="tbl" id="tbl"></table></div>
    </div>
  </div>
</div>

<!-- 주문 상세 모달 -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-head"><h3 id="m-title">주문 상세</h3><button class="x" onclick="close_()">×</button></div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="close_()">닫기</button>
      <button class="btn btn-primary" onclick="saveOrder()">변경사항 저장</button>
    </div>
  </div>
</div>

<script src="../assets/js/store.js"></script>
<script src="admin.js"></script>
<script>
if(!adminGuard()) {} else {
renderAdminShell('order');
const STATUSES = ['전체','주문접수','결제완료','배송준비','배송중','배송완료','취소'];
const STEP = ['주문접수','결제완료','배송준비','배송중','배송완료','취소'];
let filter = '전체', curId = null;

function renderFilter(){
  const orders = DB.getOrders();
  document.getElementById('filter').innerHTML = STATUSES.map(s=>{
    const n = s==='전체'?orders.length:orders.filter(o=>o.status===s).length;
    return `<button class="filter-chip ${s===filter?'active':''}" style="padding:8px 15px;border-radius:100px;background:${s===filter?'var(--charcoal)':'#fff'};color:${s===filter?'#fff':'#6b5d4a'};border:1.5px solid var(--line);font-weight:600;font-size:.86rem" onclick="setFilter('${s}')">${s} ${n>0?`(${n})`:''}</button>`;
  }).join('');
}
function setFilter(s){ filter=s; renderFilter(); render(); }

function render(){
  let orders = DB.getOrders();
  if(filter!=='전체') orders = orders.filter(o=>o.status===filter);
  document.getElementById('count').textContent = `(${orders.length}건)`;
  const tbl = document.getElementById('tbl');
  if(!orders.length){ tbl.innerHTML = `<tbody><tr><td><div class="empty"><div class="ico">📋</div><p>해당하는 주문이 없습니다.</p></div></td></tr></tbody>`; return; }
  tbl.innerHTML = `
    <thead><tr><th>주문번호</th><th>받는분</th><th>상품</th><th>금액</th><th>주문일</th><th>상태</th><th></th></tr></thead>
    <tbody>${orders.map(o=>`<tr>
      <td style="font-weight:700;color:var(--honey-deep)">${o.orderNo}</td>
      <td>${o.buyer.name}<div class="muted">${o.buyer.phone}</div></td>
      <td class="muted">${o.items[0]?.name||''}${o.items.length>1?` 외 ${o.items.length-1}건`:''}</td>
      <td style="font-weight:700">${won(o.total)}</td>
      <td class="muted">${fmtDate(o.createdAt)}</td>
      <td><span class="st-${o.status}" style="font-weight:700">${o.status}</span></td>
      <td><div class="act"><button class="btn btn-ghost btn-sm" onclick="openOrder('${o.id}')">상세</button></div></td>
    </tr>`).join('')}</tbody>`;
}

function openOrder(id){
  curId = id;
  const o = DB.getOrder(id);
  document.getElementById('m-title').textContent = `주문 ${o.orderNo}`;
  document.getElementById('m-body').innerHTML = `
    <div class="fld-row">
      <div class="fld"><label>주문 상태</label>
        <select id="o-status" class="status-sel" style="width:100%">${STEP.map(s=>`<option ${o.status===s?'selected':''}>${s}</option>`).join('')}</select>
      </div>
      <div class="fld"><label>송장번호</label><input id="o-tracking" value="${o.tracking||''}" placeholder="택배사 송장번호"></div>
    </div>
    <div style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px">
      <div style="font-weight:700;margin-bottom:8px">받는 분 정보</div>
      <div class="muted" style="line-height:1.8">
        ${o.buyer.name} · ${o.buyer.phone}<br>
        ${o.buyer.address||''}<br>
        ${o.buyer.memo?`메모: ${o.buyer.memo}`:''}
      </div>
    </div>
    <div style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px">
      <div style="font-weight:700;margin-bottom:10px">주문 상품</div>
      ${o.items.map(i=>`<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:.9rem"><span>${i.emoji||'🍯'} ${i.name} × ${i.qty}</span><span style="font-weight:700">${won(i.price*i.qty)}</span></div>`).join('')}
      <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:.88rem;color:var(--gray)"><span>배송비</span><span>${o.shippingFee===0?'무료':won(o.shippingFee)}</span></div>
      <div style="display:flex;justify-content:space-between;padding:10px 0 0;margin-top:8px;border-top:2px solid var(--charcoal);font-weight:800;font-family:'Gowun Batang',serif"><span>합계</span><span style="color:var(--honey-deep)">${won(o.total)}</span></div>
    </div>
    <div class="muted" style="font-size:.82rem">결제수단: ${o.payMethod} · 주문일시: ${fmtDate(o.createdAt,true)}</div>`;
  document.getElementById('modal').classList.add('show');
}
function close_(){ document.getElementById('modal').classList.remove('show'); }
function saveOrder(){
  DB.updateOrder(curId, {
    status: document.getElementById('o-status').value,
    tracking: document.getElementById('o-tracking').value.trim()
  });
  adminToast('주문 정보를 저장했습니다');
  close_(); renderFilter(); render();
}
function fmtDate(ts,withTime){
  const d = new Date(ts);
  const s = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  return withTime ? s+` ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` : s;
}
document.getElementById('modal').addEventListener('click',e=>{ if(e.target.id==='modal') close_(); });
renderFilter(); render();
}
</script>
</body></html>
